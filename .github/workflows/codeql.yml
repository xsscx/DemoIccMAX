name: Build DemoIccMAX

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up vcpkg
      run: |
        $tempDir = "$env:TEMP\vcpkg"
        if (!(Test-Path -Path $tempDir)) {
          Write-Output "vcpkg not found, cloning and bootstrapping..."
          git clone https://github.com/microsoft/vcpkg.git $tempDir
          cd $tempDir
          Get-ChildItem
          cmd /c bootstrap-vcpkg.bat
        } else {
          Write-Output "vcpkg already set up."
        }
        cd $tempDir
        if (Test-Path "$tempDir\vcpkg.exe") {
          Write-Output "vcpkg.exe exists at $tempDir\vcpkg.exe"
          & "$tempDir\vcpkg.exe" install libxml2:x64-windows tiff:x64-windows wxwidgets:x64-windows
        } else {
          Write-Output "vcpkg.exe not found at $tempDir\vcpkg.exe"
          exit 1
        }
      shell: pwsh

    - name: Set up DemoIccMAX
      run: |
        $demoIccMaxDir = "$env:TEMP\DemoIccMAX"
        if (!(Test-Path -Path $demoIccMaxDir)) {
          Write-Output "DemoIccMAX not found, cloning..."
          git clone https://github.com/InternationalColorConsortium/DemoIccMAX.git $demoIccMaxDir
          cd $demoIccMaxDir
          git config user.email "you@example.com"
          git config user.name "Your Name"
          git revert b90ac3933da99179df26351c39d8d9d706ac1cc6 --no-edit
        } else {
          Write-Output "DemoIccMAX already set up."
          cd $demoIccMaxDir
        }
        Write-Output "Current directory: $PWD"
        Write-Output "Listing files in the current directory:"
        Get-ChildItem -Recurse -File -Name
      shell: pwsh

    - name: Build DemoIccMAX solution
      run: |
        $demoIccMaxDir = "$env:TEMP\DemoIccMAX"
        cd $demoIccMaxDir
        $maxCpuCount = (Get-WmiObject -Class Win32_ComputerSystem).NumberOfLogicalProcessors
        & "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe" .\Build\MSVC\BuildAll_v19.sln /t:clean /p:Configuration=Debug /p:Platform=x64 /maxcpucount:$maxCpuCount
        & "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe" .\Build\MSVC\BuildAll_v19.sln /p:Configuration=Debug /p:Platform=x64 /maxcpucount:$maxCpuCount
      shell: pwsh

    - name: Manually build IccApplyToLink with AddressSanitizer
      run: |
        $demoIccMaxDir = "$env:TEMP\DemoIccMAX"
        cd $demoIccMaxDir
        $maxCpuCount = (Get-WmiObject -Class Win32_ComputerSystem).NumberOfLogicalProcessors
        & "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe" .\Tools\CmdLine\IccApplyToLink\iccApplyToLink_v16.vcxproj /t:clean /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/fsanitize=address" /p:LinkToolAdditionalOptions="/fsanitize=address" /maxcpucount:$maxCpuCount
        & "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe" .\Tools\CmdLine\IccApplyToLink\iccApplyToLink_v16.vcxproj /p:Configuration=Debug /p:Platform:x64 /p:CLToolAdditionalOptions="/fsanitize=address" /p:LinkToolAdditionalOptions="/fsanitize=address" /maxcpucount:$maxCpuCount
      shell: pwsh

    - name: Manually build IccFromCube with AddressSanitizer
      run: |
        $demoIccMaxDir = "$env:TEMP\DemoIccMAX"
        cd $demoIccMaxDir
        $maxCpuCount = (Get-WmiObject -Class Win32_ComputerSystem).NumberOfLogicalProcessors
        & "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe" .\Tools\CmdLine\IccFromCube\iccFromCube_v16.vcxproj /t:clean /p:Configuration=Debug /p:Platform:x64 /p:CLToolAdditionalOptions="/fsanitize=address" /p:LinkToolAdditionalOptions="/fsanitize=address" /maxcpucount:$maxCpuCount
        & "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe" .\Tools\CmdLine\IccFromCube\iccFromCube_v16.vcxproj /p:Configuration=Debug /p:Platform:x64 /p:CLToolAdditionalOptions="/fsanitize=address" /p:LinkToolAdditionalOptions="/fsanitize=address" /maxcpucount:$maxCpuCount
      shell: pwsh
