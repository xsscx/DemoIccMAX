name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify Directory Structure
        run: |
          echo "Current directory:"
          pwd
          echo "Listing root directory:"
          ls -la
          echo "Listing PatchMAX directory:"
          ls -la .

      - name: Initialize the CodeQL tools
        uses: github/codeql-action/init@v3
        with:
          languages: cpp, python
          config-file: .github/codeql/codeql-config.yml

      - name: Build with CMake
        run: |
          cmake -DCMAKE_INSTALL_PREFIX=$HOME/.local -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-g -fsanitize=address,undefined -fno-omit-frame-pointer -Wall" -Wno-dev Cmake/
          make -j8
        working-directory: Build/

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
