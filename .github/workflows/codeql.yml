name: Build and Sanitize

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download vswhere
        run: |
          $vswherePath = "${{ runner.workspace }}\vswhere.exe"
          Invoke-WebRequest -Uri https://github.com/microsoft/vswhere/releases/download/2.8.4/vswhere.exe -OutFile $vswherePath
          echo "VSWHERE_PATH=$vswherePath" >> $env:GITHUB_ENV
        shell: powershell

      - name: Cache vcpkg
        uses: actions/cache@v3
        with:
          path: ${{ runner.workspace }}/vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: |
          $vcpkgRoot = "${{ runner.workspace }}\vcpkg"
          if (!(Test-Path -Path "$vcpkgRoot\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git "$vcpkgRoot"
            Invoke-WebRequest -Uri https://github.com/microsoft/vcpkg-tool/releases/download/2024-08-01/vcpkg.exe -OutFile "$vcpkgRoot\vcpkg.exe"
          }
          if (!(Test-Path -Path "$vcpkgRoot\vcpkg.exe")) {
            Write-Error "vcpkg.exe not found at $vcpkgRoot\vcpkg.exe"
            exit 1
          } else {
            Write-Output "vcpkg.exe found at $vcpkgRoot\vcpkg.exe"
          }
          & "$vcpkgRoot\vcpkg.exe" install libxml2:x64-windows tiff:x64-windows wxwidgets:x64-windows libjpeg-turbo:x64-windows libpng:x64-windows zlib:x64-windows pcre2:x64-windows expat:x64-windows
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          echo "VCPKG_INCLUDE=$vcpkgRoot\installed\x64-windows\include" >> $env:GITHUB_ENV
          echo "VCPKG_LIBRARY=$vcpkgRoot\installed\x64-windows\lib" >> $env:GITHUB_ENV
        shell: powershell

      - name: Checkout DemoIccMAX repository
        run: |
          git clone https://github.com/InternationalColorConsortium/DemoIccMAX.git
          cd DemoIccMAX
          git config user.email "you@example.com"
          git config user.name "Your Name"
          git revert b90ac3933da99179df26351c39d8d9d706ac1cc6
        shell: powershell

      - name: Find MSBuild Path
        id: msbuild
        run: |
          $msbuildPath = &"${{ env.VSWHERE_PATH }}" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe
          echo "MSBUILD_PATH=$msbuildPath" >> $env:GITHUB_ENV
        shell: powershell

      - name: Update platform toolset to v143
        run: |
          Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
            (Get-Content $_.FullName) -replace '<PlatformToolset>v142</PlatformToolset>', '<PlatformToolset>v143</PlatformToolset>' | Set-Content $_.FullName
          }
        shell: powershell

      - name: Print environment variables
        run: |
          Write-Output "VCPKG_ROOT: $env:VCPKG_ROOT"
          Write-Output "VCPKG_INCLUDE: $env:VCPKG_INCLUDE"
          Write-Output "VCPKG_LIBRARY: $env:VCPKG_LIBRARY"
          Write-Output "MSBUILD_PATH: $env:MSBUILD_PATH"
          Get-ChildItem -Path $env:VCPKG_INCLUDE -Recurse
          Get-ChildItem -Path $env:VCPKG_LIBRARY -Recurse
        shell: powershell

      - name: Build IccProfLib
        run: |
          $msbuild = $env:MSBUILD_PATH
          & $msbuild .\DemoIccMAX\IccProfLib\IccProfLib_v19.vcxproj /m /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/I${{ env.VCPKG_INCLUDE }}" /p:LinkToolAdditionalOptions="/LIBPATH:${{ env.VCPKG_LIBRARY }} /fsanitize=address"
          & $msbuild .\DemoIccMAX\IccXML\IccLibXML\IccLibXML_v19.vcxproj /m /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/I${{ env.VCPKG_INCLUDE }}" /p:LinkToolAdditionalOptions="/LIBPATH:${{ env.VCPKG_LIBRARY }} /fsanitize=address"
        shell: powershell

      - name: Build with MSBuild
        run: |
          $msbuild = $env:MSBUILD_PATH
          & $msbuild .\DemoIccMAX\Build\MSVC\BuildAll_v19.sln /m /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/I${{ env.VCPKG_INCLUDE }}" /p:LinkToolAdditionalOptions="/LIBPATH:${{ env.VCPKG_LIBRARY }} /fsanitize=address"
          & $msbuild .\DemoIccMAX\Tools\CmdLine\IccApplyToLink\iccApplyToLink_v16.vcxproj /m /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/I${{ env.VCPKG_INCLUDE }}" /p:LinkToolAdditionalOptions="/LIBPATH:${{ env.VCPKG_LIBRARY }} /fsanitize=address"
          & $msbuild .\DemoIccMAX\Tools\CmdLine\IccFromCube\iccFromCube_v16.vcxproj /m /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/I${{ env.VCPKG_INCLUDE }}" /p:LinkToolAdditionalOptions="/LIBPATH:${{ env.VCPKG_LIBRARY }} /fsanitize=address"
        shell: powershell

      - name: Identify and copy critical files
        run: |
          $outputPackageDir = "${{ runner.workspace }}\DemoIccMAX\Package"
          New-Item -ItemType Directory -Path $outputPackageDir -Force
          $criticalFiles = @(
            'DemoIccMAXCmm.dll',
            'IccProfLib.lib',
            'iccApplyNamedCmm.exe',
            'iccApplyToLink_d.exe',
            'iccFromXml_d.exe',
            'iccTiffDump.exe',
            'liblzma.dll',
            'wxProfileDump.exe',
            'DemoIccMAXCmm.lib',
            'IccProfLib_CRTDLL.lib',
            'iccApplyNamedCmm_d.exe',
            'iccDumpProfile.exe',
            'iccRoundTrip.exe',
            'iccTiffDump_d.exe',
            'libpng16.dll',
            'wxProfileDump_d.exe',
            'IccFromXml.exe',
            'IccProfLib_DLL.dll',
            'iccApplyProfiles.exe',
            'iccDumpProfile_d.exe',
            'iccRoundTrip_d.exe',
            'iccToXml_d.exe',
            'libxml2.dll',
            'wxbase32u_vc_custom.dll',
            'IccLibXML_CRTDLL.lib',
            'IccProfLib_DLL.lib',
            'iccApplyProfiles_d.exe',
            'iccFromCube.exe',
            'iccSpecSepToTiff.exe',
            'iconv-2.dll',
            'pcre2-16.dll',
            'wxmsw32u_core_vc_custom.dll',
            'IccLibXml.lib',
            'IccToXml.exe',
            'iccApplyToLink.exe',
            'iccFromCube_d.exe',
            'iccSpecSepToTiff_d.exe',
            'jpeg62.dll',
            'tiff.dll',
            'zlib1.dll'
          )
          foreach ($file in $criticalFiles) {
            $filePath = Get-ChildItem -Path "${{ runner.workspace }}" -Recurse -Filter $file | Select-Object -First 1
            if ($filePath) {
              Copy-Item -Path $filePath.FullName -Destination $outputPackageDir
            } else {
              Write-Warning "File not found: $file"
            }
          }
        shell: powershell

      - name: Compress and Upload build artifacts
        run: |
          Compress-Archive -Path "$outputPackageDir\*" -DestinationPath "${{ runner.workspace }}\build-artifacts.zip"
        shell: powershell

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ${{ runner.workspace }}/build-artifacts.zip
