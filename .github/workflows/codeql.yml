name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Directory Structure
        run: |
          echo "Current directory:"
          pwd
          echo "Listing root directory:"
          ls -la
          echo "Listing DemoIccMAX directory:"
          ls -la .

      - name: Print Installed CodeQL Packs
        run: |
          echo "Installed CodeQL Packs:"
          codeql resolve qlpacks

      - name: Initialize the CodeQL tools
        uses: github/codeql-action/init@v3
        with:
          config-file: .github/codeql/codeql-config.yml
          languages: cpp, python

      - name: Build with CMake
        run: |
          cmake -DCMAKE_INSTALL_PREFIX=$HOME/.local -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-g -fsanitize=address,undefined -fno-omit-frame-pointer -Wall" -Wno-dev Build/Cmake/
          make clean
          make -j8
        working-directory: .

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          cleanup: true

      - name: Cleanup Database Cluster
        if: always()
        run: |
          echo "Cleaning up database cluster directory"
          rm -rf /Users/xss/actions-runner/_work/_temp/codeql_databases
          ls -la /Users/xss/actions-runner/_work/_temp/
