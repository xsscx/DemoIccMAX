name: Build DemoIccMAX

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up vcpkg
      run: |
        $vcpkgDir = "$env:USERPROFILE\vcpkg"
        if (!(Test-Path -Path $vcpkgDir)) {
          Write-Output "vcpkg not found, cloning and bootstrapping..."
          git clone https://github.com/microsoft/vcpkg.git $vcpkgDir
          cd $vcpkgDir
          cmd /c bootstrap-vcpkg.bat
        } else {
          Write-Output "vcpkg already set up."
          cd $vcpkgDir
        }
        if (Test-Path "$vcpkgDir\vcpkg.exe") {
          Write-Output "vcpkg.exe exists at $vcpkgDir\vcpkg.exe"
          & "$vcpkgDir\vcpkg.exe" integrate install
          & "$vcpkgDir\vcpkg.exe" install libxml2:x64-windows tiff:x64-windows wxwidgets:x64-windows
        } else {
          Write-Output "vcpkg.exe not found at $vcpkgDir\vcpkg.exe"
          exit 1
        }
      shell: pwsh

    - name: Set up environment variables for dependencies
      run: |
        $vcpkgDir = "$env:USERPROFILE\vcpkg"
        $env:VCPKG_ROOT = $vcpkgDir
        $env:VCPKG_DEFAULT_TRIPLET = "x64-windows"
        $env:PATH += ";$vcpkgDir\installed\x64-windows\bin;$vcpkgDir\installed\x64-windows\debug\bin"
        $env:INCLUDE += ";$vcpkgDir\installed\x64-windows\include"
        $env:LIB += ";$vcpkgDir\installed\x64-windows\lib;$vcpkgDir\installed\x64-windows\debug\lib"
        Write-Output "VCPKG_ROOT: $env:VCPKG_ROOT"
        Write-Output "VCPKG_DEFAULT_TRIPLET: $env:VCPKG_DEFAULT_TRIPLET"
        Write-Output "PATH: $env:PATH"
        Write-Output "INCLUDE: $env:INCLUDE"
        Write-Output "LIB: $env:LIB"

        # Debugging: Print the contents of the include and lib directories
        Write-Output "Contents of INCLUDE directory:"
        Get-ChildItem -Path "$vcpkgDir\installed\x64-windows\include"

        Write-Output "Contents of LIB directory:"
        Get-ChildItem -Path "$vcpkgDir\installed\x64-windows\lib"

        Write-Output "Contents of Debug LIB directory:"
        Get-ChildItem -Path "$vcpkgDir\installed\x64-windows\debug\lib"
      shell: pwsh

    - name: Set up DemoIccMAX
      run: |
        $demoIccMaxDir = "$env:USERPROFILE\DemoIccMAX"
        if (!(Test-Path -Path $demoIccMaxDir)) {
          Write-Output "DemoIccMAX not found, cloning..."
          git clone https://github.com/InternationalColorConsortium/DemoIccMAX.git $demoIccMaxDir
          cd $demoIccMaxDir
          git config user.email "you@example.com"
          git config user.name "Your Name"
          git revert b90ac3933da99179df26351c39d8d9d706ac1cc6 --no-edit
        } else {
          Write-Output "DemoIccMAX already set up."
          cd $demoIccMaxDir
        }
        Write-Output "Current directory: $PWD"
        Write-Output "Listing files in the current directory:"
        Get-ChildItem -Recurse -File -Name
      shell: pwsh

    - name: Retarget solution to use v143
      run: |
        $solutionDir = "$env:USERPROFILE\DemoIccMAX"
        cd $solutionDir
        function Update-PlatformToolset {
            param (
                [string]$filePath,
                [string]$newToolset = "v143"
            )
            
            (Get-Content $filePath) -replace 'v142', $newToolset | Set-Content $filePath
        }
        Get-ChildItem -Path $solutionDir -Recurse -Filter *.vcxproj | ForEach-Object {
            Update-PlatformToolset -filePath $_.FullName
        }
      shell: pwsh

    - name: Find MSBuild.exe
      id: msbuild
      run: |
        $paths = @(
          "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe",
          "C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\MSBuild\Current\Bin\MSBuild.exe"
        )
        
        $msbuildPath = $null
        foreach ($path in $paths) {
          if (Test-Path $path) {
            $msbuildPath = $path
            break
          }
        }
        
        if ($msbuildPath -eq $null) {
          Write-Error "MSBuild.exe not found in known locations."
          exit 1
        }
        
        Write-Output "MSBuild.exe found at $msbuildPath"
        echo "::set-output name=msbuild_path::$msbuildPath"
      shell: pwsh

    - name: Build DemoIccMAX solution
      run: |
        $demoIccMaxDir = "$env:USERPROFILE\DemoIccMAX"
        cd $demoIccMaxDir
        $msbuildPath = "${{ steps.msbuild.outputs.msbuild_path }}"
        $maxCpuCount = (Get-WmiObject -Class Win32_ComputerSystem).NumberOfLogicalProcessors
        & $msbuildPath .\Build\MSVC\BuildAll_v19.sln /t:clean /p:Configuration=Debug /p:Platform=x64 /maxcpucount:$maxCpuCount /p:VcpkgRoot=$env:VCPKG_ROOT /p:IncludePath="$env:INCLUDE" /p:LibraryPath="$env:LIB"
        & $msbuildPath .\Build\MSVC\BuildAll_v19.sln /p:Configuration=Debug /p:Platform=x64 /maxcpucount:$maxCpuCount /p:VcpkgRoot=$env:VCPKG_ROOT /p:IncludePath="$env:INCLUDE" /p:LibraryPath="$env:LIB"
      shell: pwsh

    - name: Manually build IccApplyToLink with AddressSanitizer
      run: |
        $demoIccMaxDir = "$env:USERPROFILE\DemoIccMAX"
        cd $demoIccMaxDir
        $msbuildPath = "${{ steps.msbuild.outputs.msbuild_path }}"
        $maxCpuCount = (Get-WmiObject -Class Win32_ComputerSystem).NumberOfLogicalProcessors

        # Use the INCLUDE and LIB paths from the environment variables
        & $msbuildPath .\Tools\CmdLine\IccApplyToLink\iccApplyToLink_v16.vcxproj /t:clean /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/fsanitize=address" /p:LinkToolAdditionalOptions="/fsanitize=address" /maxcpucount:$maxCpuCount /p:IncludePath="$env:INCLUDE" /p:LibraryPath="$env:LIB"
        & $msbuildPath .\Tools\CmdLine\IccApplyToLink\iccApplyToLink_v16.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/fsanitize=address" /p:LinkToolAdditionalOptions="/fsanitize=address" /maxcpucount:$maxCpuCount /p:IncludePath="$env:INCLUDE" /p:LibraryPath="$env:LIB"
      shell: pwsh

    - name: Manually build IccFromCube with AddressSanitizer
      run: |
        $demoIccMaxDir = "$env:USERPROFILE\DemoIccMAX"
        cd $demoIccMaxDir
        $msbuildPath = "${{ steps.msbuild.outputs.msbuild_path }}"
        $maxCpuCount = (Get-WmiObject -Class Win32_ComputerSystem).NumberOfLogicalProcessors

        # Use the INCLUDE and LIB paths from the environment variables
        & $msbuildPath .\Tools\CmdLine\IccFromCube\iccFromCube_v16.vcxproj /t:clean /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/fsanitize=address" /p:LinkToolAdditionalOptions="/fsanitize=address" /maxcpucount:$maxCpuCount /p:IncludePath="$env:INCLUDE" /p:LibraryPath="$env:LIB"
        & $msbuildPath .\Tools\CmdLine\IccFromCube\iccFromCube_v16.vcxproj /p:Configuration=Debug /p:Platform:x64 /p:CLToolAdditionalOptions="/fsanitize=address" /p:LinkToolAdditionalOptions="/fsanitize=address" /maxcpucount:$maxCpuCount /p:IncludePath="$env:INCLUDE" /p:LibraryPath="$env:LIB"
      shell: pwsh
