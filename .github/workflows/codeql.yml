name: Build and Sanitize

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download vswhere
      run: |
        $vswherePath = "${{ runner.workspace }}\vswhere.exe"
        Invoke-WebRequest -Uri https://github.com/microsoft/vswhere/releases/download/2.8.4/vswhere.exe -OutFile $vswherePath
        echo "VSWHERE_PATH=$vswherePath" >> $env:GITHUB_ENV
      shell: powershell

    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        cd vcpkg
        ./bootstrap-vcpkg.bat
        ./vcpkg.exe install libxml2:x64-windows tiff:x64-windows wxwidgets:x64-windows libjpeg-turbo:x64-windows libpng:x64-windows zlib:x64-windows pcre2:x64-windows expat:x64-windows
        echo "VCPKG_ROOT=${{ runner.workspace }}/vcpkg" >> $env:GITHUB_ENV
      shell: powershell

    - name: Checkout DemoIccMAX repository
      run: |
        git clone https://github.com/InternationalColorConsortium/DemoIccMAX.git
        cd DemoIccMAX
        git config user.email "you@example.com"
        git config user.name "Your Name"
        git revert b90ac3933da99179df26351c39d8d9d706ac1cc6
      shell: powershell

    - name: Find MSBuild Path
      id: msbuild
      run: |
        $msbuildPath = &"$env:VSWHERE_PATH" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe
        echo "MSBUILD_PATH=$msbuildPath" >> $env:GITHUB_ENV
      shell: powershell

    - name: Update platform toolset to v143
      run: |
        Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
          (Get-Content $_.FullName) -replace '<PlatformToolset>v142</PlatformToolset>', '<PlatformToolset>v143</PlatformToolset>' | Set-Content $_.FullName
        }
      shell: powershell

    - name: Set VCPKG include and library paths
      run: |
        $env:VCPKG_INCLUDE = "${{ env.VCPKG_ROOT }}\installed\x64-windows\include"
        $env:VCPKG_LIBRARY = "${{ env.VCPKG_ROOT }}\installed\x64-windows\lib"
      shell: powershell

    - name: Build IccProfLib
      run: |
        $msbuild = $env:MSBUILD_PATH
        & $msbuild .\DemoIccMAX\IccProfLib\IccProfLib_v19.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/I${env:VCPKG_INCLUDE}" /p:LinkToolAdditionalOptions="/LIBPATH:${env:VCPKG_LIBRARY} /fsanitize=address"
      shell: powershell

    - name: Build with MSBuild
      run: |
        $msbuild = $env:MSBUILD_PATH
        & $msbuild .\DemoIccMAX\Build\MSVC\BuildAll_v19.sln /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/I${env:VCPKG_INCLUDE}" /p:LinkToolAdditionalOptions="/LIBPATH:${env:VCPKG_LIBRARY} /fsanitize=address"
        & $msbuild .\DemoIccMAX\Tools\CmdLine\IccApplyToLink\iccApplyToLink_v16.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/I${env:VCPKG_INCLUDE}" /p:LinkToolAdditionalOptions="/LIBPATH:${env:VCPKG_LIBRARY} /fsanitize=address"
        & $msbuild .\DemoIccMAX\Tools\CmdLine\IccFromCube\iccFromCube_v16.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:CLToolAdditionalOptions="/I${env:VCPKG_INCLUDE}" /p:LinkToolAdditionalOptions="/LIBPATH:${env:VCPKG_LIBRARY} /fsanitize=address"
      shell: powershell

    - name: Identify and copy target output files
      run: |
        $outputPackageDir = "${{ runner.workspace }}\DemoIccMAX\Package"
        New-Item -ItemType Directory -Path $outputPackageDir -Force

        $targetFiles = @(
          "Tools\CmdLine\IccSpecSepToTiff\x64\Debug\iccSpecSepToTiff.exe",
          "Tools\CmdLine\IccApplyToLink\x64\Debug\iccApplyToLink.exe",
          "Tools\CmdLine\IccFromCube\x64\Debug\iccFromCube.exe",
          "Tools\CmdLine\IccDumpProfile\x64\Debug\iccDumpProfile.exe",
          "Tools\CmdLine\IccTiffDump\x64\Debug\iccTiffDump.exe",
          "Tools\CmdLine\IccRoundTrip\x64\Debug\iccRoundTrip.exe",
          "Tools\CmdLine\IccApplyNamedCmm\x64\Debug\iccApplyNamedCmm.exe",
          "Tools\CmdLine\IccApplyProfiles\x64\Debug\iccApplyProfiles.exe",
          "IccXML\CmdLine\IccFromXml\x64\Debug\IccFromXml.exe",
          "IccXML\CmdLine\IccToXml\x64\Debug\IccToXml.exe",
          "DemoIccMAXCmm.dll",
          "DemoIccMAXCmm.lib",
          "IccLibXML_CRTDLL.lib",
          "IccLibXml.lib",
          "IccProfLib_CRTDLL.lib",
          "IccProfLib_DLL.dll",
          "IccProfLib_DLL.lib",
          "IccProfLib.lib"
        )

        foreach ($file in $targetFiles) {
          $fullPath = Join-Path -Path "${{ runner.workspace }}" -ChildPath $file
          if (Test-Path $fullPath) {
            Copy-Item -Path $fullPath -Destination $outputPackageDir
          } else {
            Write-Output "File not found: $fullPath"
          }
        }

        Write-Output "Files copied to $outputPackageDir"
      shell: powershell

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: ${{ runner.workspace }}/DemoIccMAX/Package
