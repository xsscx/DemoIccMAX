name: iex master

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  invoke-powershell:
    runs-on: windows-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/builds  # Define BUILD_DIR environment variable
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Find and Configure msbuild
        run: |
          Write-Host "Searching for msbuild..."
          $msbuildPaths = @(
              "$env:ProgramFiles(x86)\Microsoft Visual Studio\Installer\vswhere.exe",
              "$env:ProgramFiles\Microsoft Visual Studio\Installer\vswhere.exe"
          )
          
          # Try to locate msbuild using vswhere
          foreach ($vswhere in $msbuildPaths) {
              if (Test-Path $vswhere) {
                  Write-Host "Using vswhere located at: $vswhere"
                  $vswhereOutput = & $vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Out-String
                  if ($vswhereOutput) {
                      $msbuildPath = $vswhereOutput.Trim()
                      break
                  }
              }
          }

          # Directly check for msbuild if not found via vswhere
          if (-not $msbuildPath) {
              Write-Host "vswhere not found or could not locate msbuild. Attempting direct search for msbuild..."
              $potentialMsbuild = Get-Command msbuild -ErrorAction SilentlyContinue
              if ($potentialMsbuild) {
                  $msbuildPath = $potentialMsbuild.Source
                  Write-Host "msbuild found directly at: $msbuildPath"
              } else {
                  Write-Error "msbuild is not installed or not available in the PATH. Ensure Visual Studio is installed."
                  exit 1
              }
          } else {
              Write-Host "msbuild found via vswhere at: $msbuildPath"
          }

          # Normalize PATH to include msbuild directory
          $msbuildDir = Split-Path $msbuildPath
          $env:PATH = "$msbuildDir;$env:PATH"
          [System.Environment]::SetEnvironmentVariable('PATH', $env:PATH)

          # Verify msbuild is callable
          if (-not (Get-Command msbuild -ErrorAction SilentlyContinue)) {
              Write-Error "msbuild is still not callable after updating PATH."
              exit 1
          }

          Write-Host "msbuild successfully configured and callable."
        shell: pwsh

      - name: Execute PowerShell Command
        run: |
          Write-Host "Starting the PowerShell script execution..."
          try {
              iex (iwr -Uri "https://raw.githubusercontent.com/InternationalColorConsortium/DemoIccMAX/refs/heads/master/contrib/Build/VS2022C/build.ps1").Content
              Write-Host "PowerShell script executed successfully."
          } catch {
              Write-Error "Error occurred while executing the PowerShell script: $_"
              exit 1
          }
        shell: pwsh

      - name: Prepare Output Directory
        run: |
          $outputDir = "$RUNNER_TEMP/output"
          if (-not (Test-Path $outputDir)) {
              Write-Host "Creating output directory: $outputDir"
              New-Item -ItemType Directory -Path $outputDir -Force
          } else {
              Write-Host "Output directory already exists: $outputDir"
          }
        shell: pwsh

      - name: Copy Build Artifacts
        run: |
          Write-Host "Copying build artifacts to output directory..."
          $directory = "${{ env.BUILD_DIR }}\PatchIccMAX"
          $outputDir = "$RUNNER_TEMP/output"
          if (-not (Test-Path $directory)) {
              Write-Error "Build directory does not exist: $directory"
              exit 1
          }
          $files = Get-ChildItem -Path $directory -Recurse -Include *.exe, *.dll, *.lib
          if ($files.Count -eq 0) {
              Write-Error "No build artifacts found in: $directory"
              exit 1
          }
          foreach ($file in $files) {
              Copy-Item -Path $file.FullName -Destination $outputDir
              Write-Host "Copied: $file.FullName"
          }
          Write-Host "Build artifacts copied successfully to: $outputDir"
        shell: pwsh

      - name: List Files in Output Directory
        run: |
          $outputDir = "$RUNNER_TEMP/output"
          Write-Host "Listing files in the output directory:"
          Get-ChildItem -Path $outputDir | ForEach-Object {
              Write-Host " - $_.FullName"
          }
        shell: pwsh

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: PatchIccMAX-Build-Artifacts
          path: $RUNNER_TEMP/output

      - name: Upload Build Logs
        uses: actions/upload-artifact@v3
        with:
          name: PatchIccMAX-Build-Logs
          path: ${{ github.workspace }}/logs
