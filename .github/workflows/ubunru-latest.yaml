name: "ubuntu-latest Master Brnach"

on:
  workflow_dispatch:    # Allows manual triggering from the Actions tab in GitHub
  push:                 # Automatically triggers on push events to the master branch
    branches:
      - master

jobs:
  # Ubuntu Build and Test Job
  revert_commit_and_build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Git anonymous identity
      run: |
        uname -a
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"
    - name: Checkout Code
      run: |
        git clone https://github.com/InternationalColorConsortium/DemoIccMAX.git
        cd DemoIccMAX
    # Install Dependencies
    - name: Install Dependencies
      run: |
        sudo apt-get update  
        # Check and install if packages are not installed
            sudo apt-get install -y  build-essential curl git make cmake clang clang-tools libxml2 libxml2-dev nlohmann-json3-dev wx-common libtiff-tools libtiff-opengl libtiff5 libwxgtk-webview3.0-gtk3
    # Configure the build with CMake
    - name: Configure the build with CMake
      run: |
        cd DemoIccMAX/Build/
        COMPILER="clang++"
        uname -a
        clang -v
        gcc -v
        sudo apt list
        cmake -DCMAKE_INSTALL_PREFIX=$HOME/.local -DCMAKE_BUILD_TYPE=Release -Wno-dev Cmake/
 
    # make
    - name: make
      run: |
        set -euxo pipefail  # Enable safer shell scripting
        cd DemoIccMAX/Build/
        pwd
        make
        uname -a
