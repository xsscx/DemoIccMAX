name: "Linux Scan Build"

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  build-linux:
    name: Build and Test Linux Master Branch with scan-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
    # Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Set up Git anonymous identity
    - name: Set up Git anonymous identity
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"

    # Install dependencies
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxml2 libxml2-dev libtiff5 libtiff5-dev nlohmann-json3-dev build-essential \
          cmake clang clang-tools python3 python3-pip libwxgtk3.0-gtk3-dev wx-common \
          libopencl-clang-dev curl git llvm clang-tools

    # Clone the DemoIccMAX repository
    - name: Clone the DemoIccMAX repository
      run: |
        git clone https://github.com/InternationalColorConsortium/DemoIccMAX.git
        cd DemoIccMAX
        git checkout master

    # Configure the build with scan-build
    - name: Configure the build with scan-build
      run: |
        cd DemoIccMAX/Build
        export CC=clang
        export CXX=clang++
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV
        clang++ --version
        clang --version
        scan-build cmake -DCMAKE_INSTALL_PREFIX=$HOME/.local -DCMAKE_BUILD_TYPE=Release -Wno-dev ../Cmake/

    # Run scan-build for static analysis
    - name: Run scan-build for static analysis
      run: |
        cd DemoIccMAX/Build
        scan-build --status-bugs make -j$(nproc)

    # Run additional system info and validation commands
    - name: Gather system information
      run: |
        uname -a
        cat /etc/os-release
        gcc -v
        lscpu
        free -m
        df -h

    # Check build success
    - name: Check build success
      run: |
        if [ -f DemoIccMAX/Build/CMakeCache.txt ]; then
          echo "✅ Build configuration exists."
        else
          echo "❌ Build configuration failed."
          exit 1
        fi

    # Upload built binaries as artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: master-build-linux
        path: DemoIccMAX/Build

    # Upload build logs
    - name: Upload build logs
      uses: actions/upload-artifact@v3
      with:
        name: build-logs
        path: DemoIccMAX/Build/CMakeCache.txt

    # Upload static analysis reports
    - name: Upload scan-build reports
      uses: actions/upload-artifact@v3
      with:
        name: scan-build-reports
        path: DemoIccMAX/Build/scan-build-reports
